<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        #character {
            display: none;
            max-width: 1024px;
            max-height: 1024px;
            margin: 20px;
        }
        #background {
            max-width: 1024px;
            max-height: 1024px;
        }
        .toggle-btn {
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>Character Selection</h1>
    <img id="character" src="" alt="Character Images">
    <img id="background" src="https://itimg.kr/3934/WH/ST.webp" alt="Background" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1;">
    <div>
        <button class="toggle-btn" onclick="changeImage('https://itimg.kr/3934/PJ/BF1.webp')">복장</button>
        <button class="toggle-btn" onclick="changeImage('https://itimg.kr/3934/O2/FT.webp')">방귀</button>
        <button class="toggle-btn" onclick="changeImage('https://itimg.kr/3934/WX/WX.webp')">맑은날씨</button>
        <button class="toggle-btn" onclick="changeImage('https://itimg.kr/3934/EVNT/OFF.webp')">변태</button>
    </div>
    <script>
        function changeImage(src) {
            const characterImg = document.getElementById('character');
            characterImg.src = src;
            characterImg.style.display = 'block';
        }
    </script>
</body>
</html>
